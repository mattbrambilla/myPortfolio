<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Mattia Brambilla - Skill</title>
  <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
  <script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')</script>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/95a9ac836e.js" crossorigin="anonymous"></script>
  <link href="./style/style.css" rel="stylesheet">
  <script src="./js/navbar.js" defer></script>
</head>

<body class="bg-white text-gray-800 font-sans flex flex-col min-h-screen">
  <div id="navbar-container"></div>

  <!-- Hero Section -->
  <section class="pt-16 bg-white shadow-md">
    <div class="container mx-auto text-center">
      <h1 class="text-4xl font-bold text-gray-800">Skill</h1>
      <p class="mt-4 text-lg text-gray-600">Ecco un elenco delle competenze acquisite.</p>
    </div>
  </section>

  <!-- Skill Section -->
  <section class="py-12 flex-grow">
    <div class="container mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Skill Item -->
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">HTML</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-red-500 h-4 rounded-full" style="width: 85%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">CSS</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-yellow-500 h-4 rounded-full" style="width: 70%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Javascript</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-green-400 h-4 rounded-full" style="width: 50%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Wordpress</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-purple-500 h-4 rounded-full" style="width: 70%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Active Directory / Entra ID</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-blue-600 h-4 rounded-full" style="width: 80%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Microsoft 365</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-orange-500 h-4 rounded-full" style="width: 85%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Windows Server</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-blue-700 h-4 rounded-full" style="width: 70%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">PowerShell</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-indigo-500 h-4 rounded-full" style="width: 70%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Reti / Networking</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-teal-500 h-4 rounded-full" style="width: 50%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">IT Support / Help Desk</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-green-500 h-4 rounded-full" style="width: 85%;"></div>
          </div>
        </div>
        <div class="px-4">
          <h3 class="text-lg font-semibold text-gray-700">Virtualizzazione</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
            <div class="bg-purple-400 h-4 rounded-full" style="width: 65%;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>
  <script>
    fetch("partials/footer.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("footer-container").innerHTML = html;
      });
  </script>
</body>

</html>
