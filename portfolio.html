<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Mattia Brambilla - Portfolio</title>
  <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
  <script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')</script>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/95a9ac836e.js" crossorigin="anonymous"></script>
  <link href="./style/style.css" rel="stylesheet">
  <script src="./js/navbar.js" defer></script>
</head>

<body class="bg-white text-gray-900 font-sans flex flex-col min-h-screen">
  <div id="navbar-container"></div>

  <!-- Hero Section -->
  <section class="pt-16 text-center px-4">
    <div class="container mx-auto text-center">
      <h1 class="text-4xl font-bold text-gray-800">Portfolio</h1>
      <p class="mt-4 text-lg text-gray-600">Tutti i progetti creati e in corso.</p>
    </div>
  </section>

  <!-- Portfolio Section -->
  <section class="py-12 flex-grow">
    <div class="container mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Project Card -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <img src="./img/project/agc.webp" alt="aGoodCandidate" class="w-full h-48 object-cover">
        <div class="p-6">
          <h3 class="text-xl font-semibold text-gray-800 text-center">aGoodCandidate</h3>
          <p class="text-gray-600 text-center mt-2">Portale lavoro sviluppato con framework Bootstrap e Laravel.</p>
          <div class="mt-4 text-center">
            <a href="./agc.html" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition duration-300">Mostra di più</a>
          </div>
        </div>
      </div>

      <!-- Project Card -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <img src="./img/project/orlandini.webp" alt="Veronica Orlandini" class="w-full h-48 object-cover">
        <div class="p-6">
          <h3 class="text-xl font-semibold text-gray-800 text-center">Veronica Orlandini</h3>
          <p class="text-gray-600 text-center mt-2">Sito One Page sviluppato con Bootstrap per una scrittrice locale.</p>
          <div class="mt-4 text-center">
            <a href="http://www.veronicaorlandini.it" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition duration-300">Vai al sito</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>
  <script>
    fetch("partials/footer.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("footer-container").innerHTML = html;
      });
  </script>
</body>

</html>
